<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Document</title>
      <link rel="stylesheet" href="style.css" />
   </head>
   <body>
      <h1>Contact us</h1>

      <div class="contact">
         <form action="#">
            <table>
               <tr>
                  <td>
                     <div class="box">
                        First Name
                        <input type="text" required />
                     </div>
                  </td>
                  <td>
                     <div class="box">
                        Last Name
                        <input type="text" required />
                     </div>
                  </td>
               </tr>
               <tr>
                  <td>
                     <div class="box">
                        Email
                        <input type="text" required />
                     </div>
                  </td>
                  <td>
                     <div class="box">
                        Phone Number
                        <input type="text" required />
                     </div>
                  </td>
               </tr>
               <tr>
                  <td colspan="2">
                     <div class="box">
                        What Do You Have In Mind
                        <textarea
                           name=""
                           id=""
                           cols="30"
                           rows="10"
                           placeholder="Please enter query"
                           required
                        ></textarea>
                     </div>
                  </td>
               </tr>
            </table>

            <div class="btn">
               <button type="submit">Submit</button>
            </div>
         </form>
      </div>
      <script src="script.js"></script>
   </body>
</html>
