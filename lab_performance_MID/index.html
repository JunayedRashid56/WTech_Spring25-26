<!DOCTYPE html>
<html lang="en">
   <head>
      <title>Product Management</title>
      <link rel="stylesheet" href="style.css" />
   </head>

   <body>
      <div class="container">
         <h2>Product Management Page</h2>

         <div class="lists">
            <label>Unit Price:</label>
            <input type="number" id="price" placeholder="Enter Unit Price" />
         </div>

         <div class="lists">
            <label>Quantity Per Day:</label>
            <input type="number" id="quantity" min="0" placeholder="Enter quantity" />
         </div>

         <div class="lists">
            <label>Total Price for 30 Days:</label>
            <input type="text" id="totalPrice" readonly />
         </div>
      </div>

      <script src="script.js"></script>
   </body>
</html>
